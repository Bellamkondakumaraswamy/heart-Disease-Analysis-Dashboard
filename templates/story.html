{% extends "base.html" %}

{% block content %}

<div class="container-fluid px-lg-4">
  <div class="text-center mb-5 fade-in-up">
    <h2 class="fw-bolder display-6">Data Journey: The Heart Disease Story</h2>
    <p class="text-muted fs-5">
      Follow our step-by-step interactive narrative uncovering the critical factors of heart health
    </p>
    <div class="bg-primary mx-auto" style="width: 60px; height: 3px; border-radius: 2px;"></div>
  </div>

  <!-- Tableau Embed -->
  <div class="tableau-container fade-in-up delay-1 mx-auto" style="max-width: 1400px;">
    <div class="ratio ratio-16x9">
      <iframe src="https://public.tableau.com/views/HEARTDISEASEANALYSISDASHBOARD/Story1?:showVizHome=no&:embed=true"
        frameborder="0" allowfullscreen>
      </iframe>
    </div>
  </div>
</div>

{% endblock %}
