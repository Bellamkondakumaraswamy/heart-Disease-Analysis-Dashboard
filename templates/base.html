<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Analysis Dashboard</title>

    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- 🔷 Navigation Bar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-heart-pulse text-danger"></i> CardioX Insights</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'home' %}active{% endif %}" href="/"><i
                                class="fa-solid fa-house fa-sm"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
                            href="/dashboard"><i class="fa-solid fa-chart-pie fa-sm"></i> Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'story' %}active{% endif %}" href="/story"><i
                                class="fa-solid fa-book-open fa-sm"></i> Story</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'preprocessing' %}active{% endif %}"
                            href="/preprocessing"><i class="fa-solid fa-laptop-code fa-sm"></i> Model</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'about' %}active{% endif %}" href="/about"><i
                                class="fa-solid fa-circle-info fa-sm"></i> About</a>
                    </li>
                    <li class="nav-item ms-lg-2 mt-2 mt-lg-0">
                        <a class="btn btn-primary btn-sm px-4 rounded-pill" style="font-size: 0.95rem;"
                            href="/contact"><i class="fa-solid fa-envelope"></i> Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 🔷 Page Content -->
    <main class="flex-fill">
        <div class="container mt-5 mb-5 fade-in-up">
            {% block content %}
            {% endblock %}
        </div>
    </main>

    <!-- 🔷 Footer -->
    <footer>
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-md-start mb-3 mb-md-0">
                    <p class="mb-0">
                        © 2026 Heart Disease Analysis Project.
                    </p>
                </div>
                <div class="col-md-6 text-md-end">
                    <span class="text-muted small">Built with Flask & Bootstrap</span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
