{% extends "base.html" %}

{% block content %}

<div class="container fade-in-up" style="max-width: 700px;">

    <div class="text-center mb-5">
        <h2 class="fw-bolder display-6">Get in Touch</h2>
        <p class="text-muted fs-5">Have questions or suggestions? We'd love to hear from you.</p>
        <div class="bg-primary mx-auto mt-3" style="width: 60px; height: 3px; border-radius: 2px;"></div>
    </div>

    {% if success %}
    <div class="alert alert-success border-0 bg-success bg-opacity-25 text-white shadow text-center rounded-4 mb-4"
        role="alert">
        <i class="fa-solid fa-circle-check fs-4 mb-2 d-block"></i>
        Thank you for contacting us! We will get back to you soon.
    </div>
    {% endif %}

    <div class="card p-5 border-0 rounded-4 shadow-lg position-relative overflow-hidden">

        <!-- Decorative bg -->
        <div class="position-absolute top-0 start-0 w-100 h-100 opacity-10 pointer-events-none"
            style="background: radial-gradient(circle at top right, var(--primary-gradient), transparent 60%); z-index: 0;">
        </div>

        <form method="POST" class="position-relative" style="z-index: 1;">

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                class="fa-solid fa-user"></i></span>
                        <input type="text" class="form-control border-start-0 ps-0" name="name" placeholder="John Doe"
                            required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 border-secondary text-muted"><i
                                class="fa-solid fa-envelope"></i></span>
                        <input type="email" class="form-control border-start-0 ps-0" name="email"
                            placeholder="john@example.com" required>
                    </div>
                </div>

                <div class="col-12">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" name="message" rows="5" placeholder="How can we help you?"
                        required></textarea>
                </div>

                <div class="col-12 mt-4 text-center">
                    <button type="submit" class="btn btn-primary btn-lg px-5 shadow rounded-pill w-100">
                        Send Message <i class="fa-solid fa-paper-plane ms-2"></i>
                    </button>
                </div>
            </div>

        </form>
    </div>

</div>

{% endblock %}
